<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content"/>
<title>TacticalOps — rfConn</title>
<script src="https://js.puter.com/v2/"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{height:100%}
body{width:100%;height:100%;background:#050810;color:#b8ccd8;font-family:'Share Tech Mono',monospace;overflow:hidden}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:#0b1018}
::-webkit-scrollbar-thumb{background:#182028;border-radius:2px}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* ── Desktop nav (left sidebar) ── */
.nav-sidebar{
  width:66px;background:#0b1018;border-right:1px solid rgba(0,229,160,0.1);
  display:flex;flex-direction:column;padding:4px 0;gap:1px;
  flex-shrink:0;overflow-y:auto
}
.nav-btn{
  width:100%;padding:11px 4px;border:none;border-left:2px solid transparent;
  background:transparent;cursor:pointer;display:flex;flex-direction:column;
  align-items:center;gap:4px;color:#4a6070;font-family:'Share Tech Mono',monospace;
  font-size:8px;letter-spacing:.4px;transition:all .15s
}
.nav-btn:hover{background:rgba(0,229,160,.07);color:#00e5a0}
.nav-btn.on{background:rgba(0,229,160,.12);color:#00e5a0;border-left:2px solid #00e5a0}
.nav-icon{font-size:15px;line-height:1}
.nav-bottom-bar{display:none}

table{width:100%;border-collapse:collapse;font-size:11px}
th{text-align:left;padding:5px 7px;font-weight:400;letter-spacing:1px;color:#4a6070;border-bottom:1px solid rgba(0,229,160,.1);white-space:nowrap}
td{padding:5px 7px;border-bottom:1px solid rgba(0,229,160,.04)}
tr:hover td{background:rgba(0,229,160,.03)}

input[type=text]{background:#0d1520;border:1px solid rgba(0,229,160,.3);color:#b8ccd8;padding:8px 11px;border-radius:3px;font-family:'Share Tech Mono',monospace;font-size:11px;outline:none;width:100%;transition:border-color .15s}
input[type=text]:focus{border-color:rgba(0,229,160,.6)}
button.tx-btn{background:#00e5a0;color:#050810;border:none;padding:8px 18px;border-radius:3px;cursor:pointer;font-family:'Orbitron',monospace;font-size:10px;font-weight:700;letter-spacing:1px;white-space:nowrap;transition:background .15s}
button.tx-btn:hover{background:#00ffb3}
button.tx-btn:disabled{background:#1a3028;color:#2a5040;cursor:not-allowed}

.panel-anim{animation:fadeIn .2s ease}
.spec-bar{flex:1;min-width:1px;border-radius:1px 1px 0 0;transition:height .3s}
.quick-btn{text-align:left;background:#0d1520;border:1px solid rgba(0,229,160,.15);color:#6ab8a0;padding:9px 13px;border-radius:3px;cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:11px;width:100%;transition:all .15s;letter-spacing:.3px}
.quick-btn:hover{background:rgba(0,229,160,.08);border-color:rgba(0,229,160,.35);color:#00e5a0}
.puter-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:2px;font-size:9px;letter-spacing:1px;font-family:'Orbitron',monospace}

/* ── AI panel input area — fixed to bottom of viewport on mobile ── */
.ai-input-area{
  padding:8px 12px;border-top:1px solid rgba(0,229,160,0.1);
  display:flex;gap:7px;flex-shrink:0;background:#0b1018;
}

/* ══════════════════════════════════════════════
   LANDSCAPE PHONE (height ≤ 500px, landscape)
   Nav becomes bottom tab bar. Right sidebar stays.
   Layout: top bar → [main content] → bottom nav
   ══════════════════════════════════════════════ */
@media (max-height:500px) and (orientation:landscape){

  /* Top bar — slim */
  .topbar{height:28px!important;padding:0 8px!important}
  .topbar-title{font-size:10px!important;letter-spacing:2px!important}
  .topbar-sub{display:none!important}
  .topbar-refresh{padding:2px 6px!important;font-size:8px!important}
  .topbar-right{gap:8px!important}
  .topbar-time{font-size:9px!important;letter-spacing:1px!important}
  .topbar-badge{font-size:8px!important}

  /* Bottom bar — hide to save space */
  .bottombar{display:none!important}

  /* Left nav — HIDE, replaced by bottom tabs */
  .nav-sidebar{display:none!important}

  /* Bottom nav tab bar */
  .nav-bottom-bar{
    display:flex!important;
    flex-direction:row;
    background:#0b1018;
    border-top:1px solid rgba(0,229,160,0.15);
    height:46px;
    flex-shrink:0;
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
  }
  .nav-bottom-bar .nav-btn{
    flex:0 0 auto;
    width:58px;
    padding:4px 2px;
    border-left:none;
    border-top:2px solid transparent;
    flex-direction:column;
    font-size:7px;
    gap:2px;
  }
  .nav-bottom-bar .nav-btn.on{
    border-left:none!important;
    border-top:2px solid #00e5a0!important;
    background:rgba(0,229,160,.1)!important;
    color:#00e5a0!important;
  }
  .nav-bottom-bar .nav-icon{font-size:13px!important}

  /* Right sidebar — compact */
  .right-sidebar{width:160px!important}
  .radar-canvas{width:120px!important;height:120px!important}
  .status-grid{grid-template-columns:1fr 1fr!important}

  /* Main content — compact tables */
  table{font-size:9px!important}
  th{padding:2px 4px!important;font-size:8px!important}
  td{padding:2px 4px!important;font-size:9px!important}

  /* Panel headers */
  .phdr{padding:3px 8px!important}
  .phdr-title{font-size:9px!important;letter-spacing:1px!important}
  .phdr-sub{display:none!important}

  /* Charts */
  .nrf24-chart{height:55px!important}
  .spec-chart{height:60px!important}

  /* AI quick grid */
  .quick-grid{grid-template-columns:1fr 1fr!important}

  /* Pwnagotchi strip */
  .pwna-strip{padding:4px 8px!important;font-size:9px!important;gap:8px!important}

  /* RF cards */
  .rf-card{padding:5px 8px!important}

  /* History — collapse to save space */
  .hist-section{display:none!important}
}

/* ══════════════════════════════════════════════
   SMALL PORTRAIT (≤ 480px width)
   Left sidebar stays but narrower
   ══════════════════════════════════════════════ */
@media (max-width:480px) and (orientation:portrait){
  .topbar-sub{display:none!important}
  .right-sidebar{display:none!important}
  .nav-sidebar{width:50px!important}
  .nav-btn{padding:9px 2px!important;font-size:7px!important}
  .nav-icon{font-size:13px!important}
  table{font-size:10px!important}
  th,td{padding:3px 5px!important}
  .topbar-badge{font-size:8px!important}
  .phdr-sub{display:none!important}
  .hist-section{display:none!important}
}

/* ══════════════════════════════════════════════
   TABLET LANDSCAPE (600–900px)
   ══════════════════════════════════════════════ */
@media (min-width:600px) and (max-width:900px) and (orientation:landscape){
  .right-sidebar{width:160px!important}
  .radar-canvas{width:130px!important;height:130px!important}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;
const T={bg0:"#050810",bg1:"#0b1018",bg2:"#111820",bg3:"#182028",acc:"#00e5a0",acc2:"#38b2ff",warn:"#ffaa00",danger:"#ff4444",text:"#b8ccd8",dim:"#4a6070",border:"rgba(0,229,160,0.1)",display:"'Orbitron',monospace"};

/* ── FA icon helper ── */
const Ico=({n,style={}})=><i className={`fa-solid fa-${n}`} style={{fontSize:"inherit",...style}}/>;

const SigBar=({rssi,min=-100,max=-30})=>{
  const pct=Math.max(0,Math.min(100,((rssi-min)/(max-min))*100));
  const c=pct>60?T.acc:pct>30?T.warn:T.danger;
  return <div style={{display:"flex",alignItems:"center",gap:5}}>
    <div style={{width:46,height:3,background:T.bg3,borderRadius:2,overflow:"hidden"}}>
      <div style={{width:`${pct}%`,height:"100%",background:c,transition:"width .4s"}}/>
    </div>
    <span style={{fontSize:9,color:T.dim,minWidth:34}}>{rssi}dB</span>
  </div>;
};

const LiveDot=({live,pulse=true})=>(
  <span style={{display:"inline-block",width:7,height:7,borderRadius:"50%",background:live?T.acc:T.dim,animation:live&&pulse?"pulse 2s infinite":"none",flexShrink:0}}/>
);

const PanelHdr=({title,sub,live})=>(
  <div className="phdr" style={{padding:"7px 13px",borderBottom:`1px solid ${T.border}`,background:T.bg2,display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
    <div style={{display:"flex",alignItems:"center",gap:8}}>
      <LiveDot live={live}/>
      <span className="phdr-title" style={{fontFamily:T.display,fontSize:11,letterSpacing:2,color:T.acc}}>{title}</span>
      {sub&&<span className="phdr-sub" style={{fontSize:10,color:T.dim}}>— {sub}</span>}
    </div>
    <span style={{fontSize:9,letterSpacing:1,color:live?T.acc:T.dim,fontFamily:T.display}}>{live?"● LIVE":"○ SIM"}</span>
  </div>
);

/* ── ADS-B Panel ── */
function AdsbPanel({data,live,state,hideClearButtons,clearAdsbHistory}){
  const [history,setHistory]=React.useState([]);
  const load=React.useCallback(async()=>{try{const r=await fetch("/api/history/adsb");if(r.ok){const j=await r.json();setHistory(j.data||[]);}}catch(e){}},[]);
  React.useEffect(()=>{load();},[load]);
  React.useEffect(()=>{load();},[data,load]);
  const clearLocal=async()=>{try{const r=await fetch("/api/history/adsb",{method:"DELETE"});if(r.ok){setHistory([]);clearAdsbHistory();}}catch(e){}};
  const Row=({f,t})=><tr>
    <td style={{color:T.acc2,fontWeight:700}}>{f.id?<a href={`https://globe.adsbexchange.com/?icao=${encodeURIComponent(f.id)}`} target="_blank" rel="noreferrer" style={{color:T.acc2,textDecoration:"underline"}}>{f.callsign||f.id}</a>:(f.callsign||"———")}</td>
    <td>{(f.alt||0).toLocaleString()}</td><td>{f.spd||0}</td><td>{f.hdg||0}°</td><td>{f.dist||0}</td>
    <td style={{color:f.squawk>=7500?T.danger:T.dim}}>{f.squawk||"—"}</td>
    <td><SigBar rssi={f.rssi||-70}/></td>
    {t&&<td style={{color:T.dim,fontSize:10}}>{f.ts?new Date(f.ts).toLocaleTimeString():"—"}</td>}
  </tr>;
  return(
    <div className="panel-anim" style={{overflow:"auto",height:"100%"}}>
      <PanelHdr title="ADS-B FLIGHTS" sub="readsb → :30003" live={live}/>
      <div style={{padding:"8px 4px"}}>
        <table><thead><tr>{["CALLSIGN","ALT ft","SPD kt","HDG","DIST km","SQUAWK","RSSI"].map(h=><th key={h}>{h}</th>)}</tr></thead>
          <tbody>{data.map((f,i)=><Row key={i} f={f}/>)}</tbody>
        </table>
        {data.length===0&&<div style={{padding:30,textAlign:"center",color:T.dim,fontSize:11}}>Waiting for aircraft...</div>}
        {history.length>0&&<div className="hist-section" style={{marginTop:20,borderTop:`2px solid ${T.border}`,paddingTop:10}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{fontSize:12,color:T.acc,fontFamily:T.display}}>FLIGHT HISTORY ({history.length})</div>
            {!hideClearButtons&&<button onClick={clearLocal} style={{fontSize:9,padding:"4px 8px",background:T.danger,color:"#fff",border:"none",borderRadius:2,cursor:"pointer"}}>Clear history</button>}
          </div>
          <table><thead><tr>{["CALLSIGN","ALT ft","SPD kt","HDG","DIST km","SQUAWK","RSSI","TIME"].map(h=><th key={h}>{h}</th>)}</tr></thead>
            <tbody>{history.slice(-50).reverse().map((f,i)=><Row key={i} f={f} t/>)}</tbody>
          </table>
        </div>}
      </div>
    </div>
  );
}

/* ── WiFi Panel ── */
function WifiPanel({data,pwna,live,state}){
  const Row=({n,t})=><tr>
    <td style={{color:T.acc,maxWidth:130,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{n.ssid}</td>
    <td style={{color:T.dim,fontSize:10}}>{n.bssid}</td><td>{n.ch}</td>
    <td style={{color:n.band==="5GHz"?T.acc2:T.warn,fontSize:10}}>{n.band}</td>
    <td style={{color:n.enc==="Open"?T.danger:n.enc?.includes("✓")?T.acc:T.text}}>{n.enc}</td>
    <td style={{color:n.cli>7?T.warn:T.text}}>{n.cli}</td>
    <td><SigBar rssi={n.rssi||-70}/></td>
    {t&&<td style={{color:T.dim,fontSize:10}}>{new Date(n.ts||Date.now()).toLocaleTimeString()}</td>}
  </tr>;
  return(
    <div className="panel-anim" style={{overflow:"auto",height:"100%"}}>
      <PanelHdr title="WIFI INTELLIGENCE" sub="ESP32 + Pwnagotchi" live={live}/>
      <div style={{padding:8}}>
        <div className="pwna-strip" style={{padding:"8px 13px",background:"rgba(255,170,0,.06)",border:`1px solid rgba(255,170,0,.18)`,borderRadius:3,display:"flex",gap:20,flexWrap:"wrap",fontSize:11,marginBottom:8}}>
          <span style={{color:T.warn,letterSpacing:1,fontFamily:T.display,fontSize:10}}>PWNAGOTCHI</span>
          <span style={{color:T.dim}}>mood: <span style={{color:T.acc}}>{pwna.mood||"unknown"}</span></span>
          <span style={{color:T.dim}}>captures: <span style={{color:T.acc}}>{pwna.captures||0}</span></span>
          <span style={{color:T.dim}}>epoch: <span style={{color:T.acc}}>{pwna.epoch||0}</span></span>
          <span style={{color:pwna.live?T.acc:T.dim,fontSize:9}}>{pwna.live?"● LIVE":"○ SIM"}</span>
        </div>
        <table><thead><tr>{["SSID","BSSID","CH","BAND","ENC","CLI","SIG"].map(h=><th key={h}>{h}</th>)}</tr></thead>
          <tbody>{data.map((n,i)=><Row key={i} n={n}/>)}</tbody>
        </table>
        {data.length===0&&<div style={{padding:20,textAlign:"center",color:T.dim,fontSize:11}}>No networks captured yet</div>}
        {state.wifi.history&&state.wifi.history.length>0&&<div className="hist-section" style={{marginTop:20,borderTop:`2px solid ${T.border}`,paddingTop:10}}>
          <div style={{fontSize:12,color:T.acc,marginBottom:10,fontFamily:T.display}}>WIFI HISTORY ({state.wifi.history.length})</div>
          <table><thead><tr>{["SSID","BSSID","CH","BAND","ENC","CLI","SIG","TIME"].map(h=><th key={h}>{h}</th>)}</tr></thead>
            <tbody>{state.wifi.history.slice(-50).reverse().map((n,i)=><Row key={i} n={n} t/>)}</tbody>
          </table>
        </div>}
      </div>
    </div>
  );
}

/* ── BLE Panel ── */
function BlePanel({data,live,state}){
  const Row=({d})=><tr>
    <td style={{color:T.acc2}}>{d.name||"Unknown"}</td>
    <td style={{color:T.dim,fontSize:10}}>{d.mac}</td>
    <td style={{color:T.dim}}>{d.type||"Generic"}</td>
    <td><SigBar rssi={d.rssi||-80}/></td>
    <td style={{color:T.dim,fontSize:10}}>{new Date(d.seen||Date.now()).toLocaleTimeString()}</td>
  </tr>;
  return(
    <div className="panel-anim" style={{overflow:"auto",height:"100%"}}>
      <PanelHdr title="BLE DEVICES" sub="ESP32 ×3" live={live}/>
      <div style={{padding:"8px 4px"}}>
        <table><thead><tr>{["NAME","MAC","TYPE","RSSI","LAST SEEN"].map(h=><th key={h}>{h}</th>)}</tr></thead>
          <tbody>{data.map((d,i)=><Row key={i} d={d}/>)}</tbody>
        </table>
        {data.length===0&&<div style={{padding:20,textAlign:"center",color:T.dim,fontSize:11}}>No BLE devices detected</div>}
        {state.ble.history&&state.ble.history.length>0&&<div className="hist-section" style={{marginTop:20,borderTop:`2px solid ${T.border}`,paddingTop:10}}>
          <div style={{fontSize:12,color:T.acc,marginBottom:10,fontFamily:T.display}}>BLE HISTORY ({state.ble.history.length})</div>
          <table><thead><tr>{["NAME","MAC","TYPE","RSSI","LAST SEEN"].map(h=><th key={h}>{h}</th>)}</tr></thead>
            <tbody>{state.ble.history.slice(-50).reverse().map((d,i)=><Row key={i} d={d}/>)}</tbody>
          </table>
        </div>}
      </div>
    </div>
  );
}

/* ── 433 MHz Panel ── */
function Rf433Panel({data,live}){
  return(
    <div className="panel-anim" style={{overflow:"auto",height:"100%"}}>
      <PanelHdr title="433 MHz RF" sub="CC1101" live={live}/>
      <div style={{padding:10,display:"flex",flexDirection:"column",gap:6}}>
        {data.map((s,i)=><div className="rf-card" key={i} style={{padding:"9px 13px",background:T.bg2,borderRadius:3,borderLeft:`3px solid ${T.warn}`,fontSize:11}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
            <span style={{color:T.warn,letterSpacing:1,fontFamily:T.display,fontSize:10}}>{s.proto}</span>
            <span style={{color:T.dim,fontSize:10}}>{new Date(s.ts||Date.now()).toLocaleTimeString()}</span>
          </div>
          <div style={{display:"flex",gap:20,flexWrap:"wrap"}}>
            <span style={{color:T.dim}}>freq: <span style={{color:T.text}}>{s.freq} MHz</span></span>
            <span style={{color:T.dim}}>data: <span style={{color:T.acc,fontFamily:"monospace"}}>{s.data}</span></span>
            <span style={{color:T.dim}}>rssi: <span style={{color:T.text}}>{s.rssi} dBm</span></span>
          </div>
        </div>)}
        {data.length===0&&<div style={{padding:20,textAlign:"center",color:T.dim,fontSize:11}}>No RF signals decoded</div>}
        {data.length>0&&<div style={{marginTop:10,borderTop:`1px solid ${T.border}`,paddingTop:10,fontSize:10,color:T.dim}}>History: {data.length} RF signals detected</div>}
      </div>
    </div>
  );
}

/* ── LoRa Panel ── */
function LoraPanel({data,live}){
  return(
    <div className="panel-anim" style={{padding:10,overflow:"auto",height:"100%"}}>
      <PanelHdr title="LORA MONITOR" sub="XIAO SX1262 — 865 MHz" live={live}/>
      <div style={{marginTop:8,display:"flex",flexDirection:"column",gap:6}}>
        {data.map((p,i)=><div key={i} style={{padding:"8px 13px",background:T.bg2,borderRadius:3,borderLeft:`3px solid ${p.meshtastic?T.acc2:T.acc}`,fontSize:11}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
            <span style={{color:p.meshtastic?T.acc2:T.acc,letterSpacing:1}}>{p.meshtastic?"MESHTASTIC":"LORA PKT"} — {p.node_id}</span>
            <span style={{color:T.dim,fontSize:10}}>{new Date(p.ts||Date.now()).toLocaleTimeString()}</span>
          </div>
          <div style={{display:"flex",gap:16,flexWrap:"wrap"}}>
            <span style={{color:T.dim}}>freq: <span style={{color:T.text}}>{p.freq} MHz</span></span>
            <span style={{color:T.dim}}>rssi: <span style={{color:T.text}}>{p.rssi} dBm</span></span>
            <span style={{color:T.dim}}>snr: <span style={{color:T.text}}>{p.snr} dB</span></span>
            <span style={{color:T.dim}}>data: <span style={{color:T.warn}}>{p.data}</span></span>
          </div>
        </div>)}
        {data.length===0&&<div style={{padding:20,textAlign:"center",color:T.dim,fontSize:11}}>
          <div style={{marginBottom:8}}>Listening on 865.0 MHz IN865</div>
          <div style={{fontSize:10}}>XIAO ESP32S3 + Wio SX1262 — pending</div>
        </div>}
      </div>
    </div>
  );
}

/* ── NetHunter Panel ── */
function NetHunterPanel({data,live}){
  const hosts=(data?.hosts)||[];
  return(
    <div className="panel-anim" style={{padding:10,overflow:"auto",height:"100%"}}>
      <PanelHdr title="FIELD AGENT" sub="Mi A2 NetHunter" live={live}/>
      <div style={{margin:"8px 0",padding:"8px 13px",background:"rgba(56,178,255,.07)",border:`1px solid rgba(56,178,255,.2)`,borderRadius:3,display:"flex",gap:20,flexWrap:"wrap",fontSize:11}}>
        <span style={{color:T.acc2,letterSpacing:1}}>NETHUNTER</span>
        <span style={{color:T.dim}}>device: <span style={{color:T.acc2}}>{data?.device||"offline"}</span></span>
        <span style={{color:T.dim}}>hosts: <span style={{color:T.acc2}}>{hosts.length}</span></span>
        {data?.gps&&<span style={{color:T.dim}}>gps: <span style={{color:T.acc}}>{data.gps.lat?.toFixed(4)},{data.gps.lon?.toFixed(4)}</span></span>}
        <span style={{color:live?T.acc2:T.dim,fontSize:10}}>{live?"● LIVE":"○ OFFLINE"}</span>
      </div>
      <div style={{fontSize:10,color:T.dim,letterSpacing:2,margin:"10px 0 6px"}}>DISCOVERED HOSTS — NMAP</div>
      {hosts.length===0&&<div style={{padding:12,textAlign:"center",color:T.dim,fontSize:11}}>No hosts discovered yet</div>}
      <table>
        <thead><tr>{["IP ADDRESS","HOSTNAME","FIRST SEEN"].map(h=><th key={h}>{h}</th>)}</tr></thead>
        <tbody>{hosts.map((h,i)=><tr key={i}>
          <td style={{color:T.acc2}}>{h.ip}</td>
          <td style={{color:T.dim}}>{h.name||"—"}</td>

        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {puterUser&&<span style={{fontSize:9,color:T.acc}}><Ico n="user"/> {puterUser}</span>}
          <span className="puter-badge" style={{background:puterReady?"rgba(0,229,160,.1)":"rgba(74,96,112,.1)",border:`1px solid ${puterReady?T.acc:T.dim}`,color:puterReady?T.acc:T.dim}}>{puterReady?"PUTER READY":"LOADING"}</span>

        <div ref={bottomRef} style={{height:1}}/>

/* ── Radar ── */
function Radar({aircraft,receiver}){
  const cvRef=useRef();const angRef=useRef(0);const rafRef=useRef();
  const brg=(la1,lo1,la2,lo2)=>{const d=(lo2-lo1)*Math.PI/180,a1=la1*Math.PI/180,a2=la2*Math.PI/180;return(Math.atan2(Math.sin(d)*Math.cos(a2),Math.cos(a1)*Math.sin(a2)-Math.sin(a1)*Math.cos(a2)*Math.cos(d))*180/Math.PI+360)%360;};
  useEffect(()=>{
    const cv=cvRef.current;if(!cv)return;
    const ctx=cv.getContext("2d"),W=cv.width,H=cv.height,cx=W/2,cy=H/2,R=W/2-4;
    const draw=()=>{
      ctx.clearRect(0,0,W,H);
      ctx.fillStyle="#050810";ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.fill();
      [.25,.5,.75,1].forEach(r=>{ctx.beginPath();ctx.arc(cx,cy,R*r,0,Math.PI*2);ctx.strokeStyle="rgba(0,229,160,0.12)";ctx.lineWidth=1;ctx.stroke();});
      ctx.strokeStyle="rgba(0,229,160,0.12)";ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(cx-R,cy);ctx.lineTo(cx+R,cy);ctx.stroke();
      ctx.beginPath();ctx.moveTo(cx,cy-R);ctx.lineTo(cx,cy+R);ctx.stroke();
      const a=angRef.current;
      ctx.save();ctx.translate(cx,cy);ctx.rotate(a);
      ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,R,-Math.PI*0.6,0);ctx.closePath();
      const sg=ctx.createRadialGradient(0,0,0,0,0,R);
      sg.addColorStop(0,"rgba(0,229,160,0.3)");sg.addColorStop(1,"rgba(0,229,160,0)");
      ctx.fillStyle=sg;ctx.fill();ctx.restore();
      ctx.save();ctx.translate(cx,cy);ctx.rotate(a);
      ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(R,0);
      ctx.strokeStyle="rgba(0,229,160,0.9)";ctx.lineWidth=1.5;ctx.stroke();ctx.restore();
      (aircraft||[]).slice(0,20).forEach(ac=>{
        if(!ac.lat||!ac.lon||!receiver?.lat||!receiver?.lon)return;
        const b=brg(receiver.lat,receiver.lon,ac.lat,ac.lon);
        const br=(b-90)*Math.PI/180,r=R*Math.min((ac.dist||0)/250,1);
        const x=cx+Math.cos(br)*r,y=cy+Math.sin(br)*r;
        ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fillStyle=T.acc2;ctx.fill();
        ctx.beginPath();ctx.arc(x,y,6,0,Math.PI*2);ctx.strokeStyle="rgba(56,178,255,0.4)";ctx.lineWidth=1;ctx.stroke();
      });
      ctx.beginPath();ctx.arc(cx,cy,3,0,Math.PI*2);ctx.fillStyle=T.acc;ctx.fill();
      angRef.current=(a+0.018)%(Math.PI*2);rafRef.current=requestAnimationFrame(draw);
    };
    draw();return()=>cancelAnimationFrame(rafRef.current);
  },[aircraft]);
  return <canvas ref={cvRef} className="radar-canvas" width={170} height={170} style={{borderRadius:"50%",border:"1px solid rgba(0,229,160,0.2)",display:"block"}}/>;
}

  const [refreshing,setRefreshing]=useState(false);
  const [panelVisibility,setPV]=useState(()=>{try{return JSON.parse(localStorage.getItem("tacops_panelVisibility"))||Object.fromEntries(NAV.map(n=>[n.id,true]));}catch{return Object.fromEntries(NAV.map(n=>[n.id,true]));}});

                </label>
              </div>
              <div style={{flex:1,overflow:"auto",padding:"8px 4px"}}>
                {NAV.map(n=>(
                  <div key={n.id} style={{padding:"8px 10px",borderBottom:`1px solid ${T.border}`,display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer",background:panelVisibility[n.id]?"rgba(0,229,160,.05)":"transparent"}} onClick={()=>togglePanel(n.id)}>
                    <span style={{fontSize:10,color:T.dim,flex:1}}><Ico n={n.fa} style={{marginRight:6,fontSize:11}}/>{n.label}</span>
                    <span style={{fontSize:11,color:panelVisibility[n.id]?T.acc:T.dim,fontWeight:700}}>{panelVisibility[n.id]?"✓":"—"}</span>
                  </div>
                ))}
              </div>
              <div style={{padding:"6px 10px",borderTop:`1px solid ${T.border}`,flexShrink:0,fontSize:9,color:T.dim}}>{Object.values(panelVisibility).filter(Boolean).length}/{NAV.length} enabled</div>
            </div>
          ):(
            <>
              <div style={{padding:"10px 0 6px",borderBottom:`1px solid ${T.border}`,flexShrink:0}}>
                <div style={{fontSize:9,color:T.dim,letterSpacing:2,textAlign:"center",marginBottom:8,fontFamily:T.display}}>RADAR</div>
                <div style={{display:"flex",justifyContent:"center"}}><Radar aircraft={state.adsb?.data||[]} receiver={state.receiver}/></div>
                <div style={{display:"flex",justifyContent:"center",gap:14,marginTop:7,fontSize:10}}>
                  <span style={{color:T.acc2}}><Ico n="plane"/> {(state.adsb?.data||[]).length}</span>
                  <span style={{color:T.acc}}><Ico n="wifi"/> {(state.wifi?.data||[]).length}</span>
                  <span style={{color:T.dim}}><Ico n="bluetooth"/> {(state.ble?.data||[]).length}</span>
                </div>
              </div>
              <div style={{padding:"5px 10px",fontSize:9,color:T.dim,letterSpacing:2,borderBottom:`1px solid ${T.border}`,background:T.bg2,fontFamily:T.display,flexShrink:0,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span>ALERT FEED</span>
                {!hideClearButtons&&<button onClick={()=>{if(wsRef.current&&wsRef.current.readyState===WebSocket.OPEN)wsRef.current.send(JSON.stringify({type:"clear_alerts"}));}} style={{fontSize:8,padding:"2px 6px",background:T.danger,color:"#fff",border:"none",borderRadius:2,cursor:"pointer",opacity:wsConn?1:0.5,pointerEvents:wsConn?"auto":"none"}}>Clear</button>}
              </div>
              <div style={{flex:1,overflow:"auto"}}>
                {alerts.length===0&&<div style={{padding:14,fontSize:10,color:T.dim,textAlign:"center"}}>Monitoring...</div>}
                {alerts.map((a,i)=>(
                  <div key={i} style={{padding:"7px 10px",borderBottom:"1px solid rgba(0,229,160,.03)",borderLeft:`2px solid ${a.sev==="danger"?T.danger:a.sev==="warn"?T.warn:T.acc}`,animation:"fadeIn .2s ease"}}>
                    <div style={{fontSize:10,color:a.sev==="danger"?T.danger:a.sev==="warn"?T.warn:T.acc,lineHeight:1.4}}>{a.msg}</div>
                    <div style={{fontSize:9,color:T.dim,marginTop:2}}>{new Date(a.ts||Date.now()).toLocaleTimeString()}</div>
                  </div>
                ))}
              </div>
              <div className="status-grid" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:1,borderTop:`1px solid ${T.border}`,flexShrink:0}}>
                {[["ADS-B",state.adsb?.live,T.acc2],["WiFi",state.wifi?.live,T.acc],["BLE",state.ble?.live,T.acc],["433MHz",state.config?.rf433Mode!=="disabled"&&state.rf433?.live,T.warn],["LoRa",state.lora?.live,T.acc],["NetHunter",state.nethunter?.live,T.acc2],["PWNA",state.pwnagotchi?.live,T.warn],["MQTT",mqttConn,T.acc]].map(([l,live,c])=>(
                  <div key={l} style={{padding:"6px 8px",background:T.bg2,textAlign:"center"}}>
                    <div style={{fontSize:8,color:live?c:T.dim,letterSpacing:1}}>{live?"● LIVE":"○ SIM"}</div>
                    <div style={{fontSize:9,color:T.dim,marginTop:1}}>{l}</div>
                  </div>
                ))}
              </div>
            </>
          )}
        </div>
      </div>

      {/* BOTTOM NAV — landscape phones only (CSS shows/hides) */}
      <div className="nav-bottom-bar">
        {visNav.map(n=><NavBtn key={n.id} n={n}/>)}
        <SettingsBtn/>
      </div>

      {/* BOTTOM BAR */}
      <div className="bottombar" style={{padding:"3px 14px",background:T.bg1,borderTop:`1px solid ${T.border}`,display:"flex",justifyContent:"space-between",flexShrink:0}}>
        <span style={{fontSize:9,color:T.dim}}>groot@rfConn — TacticalOps v2.0 — readsb + MQTT + Puter.js AI</span>
        <span style={{fontSize:9,color:T.dim}}>10.96.42.97 // rfconn.local</span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
